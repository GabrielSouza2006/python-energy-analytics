<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erro — Energy Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F1117; --surface: #1A1D27; --border: #2A2D3A;
      --text: #E0E4F0; --muted: #6B7080; --accent3: #FF6B6B;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent3);
      border-radius: 10px;
      padding: 40px 44px;
      max-width: 560px;
      width: 100%;
    }
    .icon { font-size: 2.4rem; margin-bottom: 16px; }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
    .msg {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--accent3);
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 6px;
      padding: 14px 16px;
      margin-top: 16px;
      line-height: 1.6;
      word-break: break-word;
    }
    .hint {
      margin-top: 22px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .hint code {
      font-family: var(--mono);
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.78rem;
    }
    a { color: #4A9EFF; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <h1>Não foi possível carregar o dashboard</h1>
    <div class="msg">{{ mensagem }}</div>
    <div class="hint">
      Verifique se o arquivo <code>household_power_consumption.csv</code>
      está na pasta <code>data/</code> do projeto.<br><br>
      Download: <a href="https://archive.ics.uci.edu/ml/datasets/individual+household+electric+power+consumption" target="_blank">UCI ML Repository</a>
    </div>
  </div>
</body>
</html>
